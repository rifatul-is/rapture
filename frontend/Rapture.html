<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Scroll observer hook ─────────────────────────────────────── */
function useFadeUp(threshold = 0.15) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { el.classList.add('visible'); obs.disconnect(); }
    }, { threshold });
    obs.observe(el);
    return () => obs.disconnect();
  }, [threshold]);
  return ref;
}

function FadeUp({ children, delay = 0, className = '', as: Tag = 'div' }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { el.classList.add('visible'); obs.disconnect(); }
    }, { threshold: 0.12 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return (
    <Tag
      ref={ref}
      className={`fade-up ${delay ? `delay-${delay}` : ''} ${className}`}
      style={delay ? { transitionDelay: `${delay * 0.1}s` } : undefined}
    >
      {children}
    </Tag>
  );
}

/* ── Typing effect ────────────────────────────────────────────── */
const FULL_TEXT = "You've started 6 courses this year.\nYou finished 0.\nRapture AI makes quitting impossible.";
function TypingHero() {
  const [displayed, setDisplayed] = useState('');
  const [done, setDone] = useState(false);
  useEffect(() => {
    let i = 0;
    const delays = [];
    function type() {
      if (i <= FULL_TEXT.length) {
        setDisplayed(FULL_TEXT.slice(0, i));
        if (i === FULL_TEXT.length) setDone(true);
        i++;
        const next = FULL_TEXT[i] === '\n' ? 300 : Math.random() * 30 + 25;
        delays.push(setTimeout(type, next));
      }
    }
    const start = setTimeout(type, 600);
    return () => { clearTimeout(start); delays.forEach(clearTimeout); };
  }, []);

  const lines = displayed.split('\n');
  return (
    <h1 className="text-4xl md:text-5xl lg:text-6xl font-black leading-[1.08] tracking-tight text-white">
      {lines.map((line, i) => (
        <span key={i} className="block">
          {i === 2
            ? line.split('Rapture AI').map((part, j) =>
                j === 0
                  ? <span key={j}>{part}</span>
                  : <React.Fragment key={j}><span className="text-violet-DEFAULT violet-glow-text">Rapture AI</span>{part}</React.Fragment>
              )
            : <span className={i === 1 ? 'text-zinc-400' : ''}>{line}</span>
          }
          {i === lines.length - 1 && !done && <span className="cursor" />}
        </span>
      ))}
      {done && <span className="cursor" />}
    </h1>
  );
}

function WaitlistSection() {
  const [form, setForm] = useState({ firstName: '', lastName: '', email: '' });
  const [status, setStatus] = useState('idle'); // idle | loading | success | error409 | error
  const [shake, setShake] = useState(false);

  const handleChange = e => setForm(f => ({ ...f, [e.target.name]: e.target.value }));

  const handleSubmit = async e => {
    e.preventDefault();
    setStatus('loading');
    try {
      const backendUrl = (typeof process !== 'undefined' && process.env && process.env.NEXT_PUBLIC_BACKEND_URL) || '';
      const res = await fetch(`${backendUrl}/api/waitlist`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(form),
      });
      if (res.ok) {
        setStatus('success');
      } else if (res.status === 409) {
        setStatus('error409');
        setShake(true);
        setTimeout(() => setShake(false), 600);
      } else {
        setStatus('error');
      }
    } catch {
      // Demo mode: simulate success
      setTimeout(() => setStatus('success'), 1200);
    }
  };

  return (
    <section id="waitlist" className="py-28 border-t border-surface-border relative overflow-hidden">
      {/* BG glow */}
      <div className="absolute inset-0 pointer-events-none" style={{ background: 'radial-gradient(ellipse 60% 50% at 50% 100%, rgba(160,120,255,0.07) 0%, transparent 70%)' }} />

        <FadeUp>
          <span className="mono text-xs font-semibold text-violet-DEFAULT tracking-widest block mb-4">EARLY ACCESS</span>
        </FadeUp>
        <FadeUp delay={1}>
          <h2 className="text-4xl md:text-5xl font-black text-white leading-tight mb-4">Stop planning.<br/>Start finishing.</h2>
        </FadeUp>
        <FadeUp delay={2}>
          <p className="text-zinc-400 text-lg mb-12">Join the waitlist. We're onboarding the first cohort manually to ensure every engineer gets set up right.</p>
        </FadeUp>

        {status === 'success' ? (
          <FadeUp className="rounded-2xl bg-emerald-500/6 border border-emerald-500/30 p-10">
            <div className="w-14 h-14 rounded-2xl bg-emerald-500/15 border border-emerald-500/30 flex items-center justify-center mx-auto mb-5">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 12L9 18L21 6" stroke="#34d399" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
            <h3 className="text-xl font-bold text-white mb-2">You're on the list.</h3>
            <p className="text-zinc-400 text-sm">We'll reach out when your spot opens. Prepare to be held accountable.</p>
          </FadeUp>

          <FadeUp delay={3} className={`rounded-2xl bg-surface-DEFAULT border border-surface-border p-8 ${shake ? 'shake' : ''}`}>
            {status === 'error409' && (
              <div className="mb-5 p-3 rounded-lg bg-amber-500/8 border border-amber-500/25 text-sm text-amber-400">
                <strong>Already registered.</strong> This email is already on the waitlist.
              </div>
            )}
            {status === 'error' && (
              <div className="mb-5 p-3 rounded-lg bg-red-500/8 border border-red-500/25 text-sm text-red-400">
                Something went wrong. Please try again.
              </div>
            )}
            <form onSubmit={handleSubmit} className="space-y-4">
              <div className="grid sm:grid-cols-2 gap-4">
                <div className="text-left">
                  <label className="mono text-xs text-zinc-500 block mb-2">FIRST NAME</label>
                  <input
                    name="firstName" type="text" required placeholder="Alex"
                    value={form.firstName} onChange={handleChange}

                {status === 'loading' ? (
                  <>
                    <svg className="animate-spin" width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.3)" strokeWidth="3"/><path d="M12 2a10 10 0 0110 10" stroke="white" strokeWidth="3" strokeLinecap="round"/></svg>
                    Submitting...
                  </>
                ) : 'Request Early Access →'}
              </button>
            </form>
            <p className="text-xs text-zinc-600 mt-5">By joining you agree to receive product updates. No spam. Unsubscribe anytime.</p>
          </FadeUp>
        )}
      </div>
    </section>
  );
}

/* ── Footer ───────────────────────────────────────────────────── */
function Footer() {
  return (
    <footer className="border-t border-surface-border py-10">
      <div className="max-w-6xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
        <div className="flex items-center gap-2">
          <div className="w-6 h-6 rounded bg-violet-DEFAULT flex items-center justify-center">
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 1L13 4.5V9.5L7 13L1 9.5V4.5L7 1Z" fill="white" fillOpacity="0.9"/></svg>
          </div>
          <span className="font-bold text-white text-sm">Rapture<span className="text-violet-DEFAULT">AI</span></span>
        </div>
        <p className="text-xs text-zinc-600 mono">© 2025 Rapture AI. All rights reserved.</p>
        <div className="flex gap-6 text-xs text-zinc-600">
          <a href="#" className="hover:text-zinc-400 transition-colors">Privacy</a>
          <a href="#" className="hover:text-zinc-400 transition-colors">Terms</a>
          <a href="mailto:hello@rapture.ai" className="hover:text-zinc-400 transition-colors">Contact</a>
        </div>
      </div>
    </footer>
  );
}

/* ── App ──────────────────────────────────────────────────────── */
function App() {
  const scrollToWaitlist = () => {
    const el = document.getElementById('waitlist');
    if (el) { window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' }); }
  };

  // Register tweaks
  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel')?.classList.remove('hidden');
      if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel')?.classList.add('hidden');
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  return (
    <div>
      <Navbar onWaitlist={scrollToWaitlist} />
      <Hero onWaitlist={scrollToWaitlist} />
      <Ticker />
      <ProblemSection />
      <FinancialStakeSection />
      <WalkthroughSection />
      <FeaturesSection />
      <WhoSection />
      <WaitlistSection />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
